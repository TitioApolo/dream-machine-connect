<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Login Test</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #ffc300;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #ffc300;
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #ffc300;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a1a;
            border: 1px solid #ffc300;
            color: #ffc300;
            font-family: monospace;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #ffc300;
            color: #0a0a0a;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background: #ffde4d;
        }
        .output {
            background: #0a0a0a;
            border: 1px solid #ffc300;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 12px;
        }
        .success {
            color: #00ff00;
        }
        .error {
            color: #ff0000;
        }
        .info {
            color: #00ccff;
        }
        .warning {
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Debug Test</h1>
        
        <div class="form-group">
            <label>Tipo de Login:</label>
            <select id="loginType">
                <option value="cliente">Cliente</option>
                <option value="pessoa">Admin (Pessoa)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="form-group">
            <label>Senha:</label>
            <input type="password" id="senha" placeholder="sua_senha">
        </div>

        <button onclick="testLogin()">🧪 Testar Login</button>
        <button onclick="testAPI()">📡 Testar API (após login)</button>
        <button onclick="clearLocalStorage()">🗑️ Limpar localStorage</button>
        <button onclick="clearOutput()">🧹 Limpar Output</button>

        <div class="output" id="output"></div>
    </div>

    <script>
        const API_BASE = "https://dreams-machine-7e6a3c0a6e6e.herokuapp.com";

        function log(message, type = "info") {
            const output = document.getElementById("output");
            const time = new Date().toLocaleTimeString();
            const color = type === "error" ? "error" : type === "success" ? "success" : type === "warning" ? "warning" : "info";
            output.innerHTML += `<span class="${color}">[${time}] ${type.toUpperCase()}: ${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById("output").innerHTML = "";
        }

        function clearLocalStorage() {
            localStorage.clear();
            log("✅ localStorage limpo", "success");
            showStorageContent();
        }

        function showStorageContent() {
            log("📦 Conteúdo do localStorage atual:", "info");
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                if (value && value.length > 100) {
                    log(`  ${key}: ${value.slice(0, 50)}...`, "info");
                } else {
                    log(`  ${key}: ${value}`, "info");
                }
            }
        }

        async function testLogin() {
            clearOutput();
            const loginType = document.getElementById("loginType").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            if (!email || !senha) {
                log("❌ Email e senha são obrigatórios", "error");
                return;
            }

            const endpoint = loginType === "cliente" ? "/login-cliente" : "/login-pessoa";
            const url = `${API_BASE}${endpoint}`;

            log(`🔐 Iniciando login ${loginType.toUpperCase()}...`, "info");
            log(`📍 Endpoint: POST ${url}`, "info");
            log(`👤 Email: ${email}`, "info");

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ email, senha }),
                });

                log(`📊 Status: ${response.status}`, response.ok ? "success" : "error");
                
                const data = await response.json();
                log(`📋 Response: ${JSON.stringify(data, null, 2)}`, "info");

                if (!response.ok) {
                    log(`❌ Erro no login: ${data.error || data.message}`, "error");
                    return;
                }

                if (!data.token) {
                    log("❌ Token não retornado na resposta!", "error");
                    return;
                }

                // Salvar dados
                localStorage.setItem("token", data.token);
                localStorage.setItem("auth_tipo", loginType);
                if (data.id) localStorage.setItem("userId", data.id);
                if (data.key) localStorage.setItem("userType", data.key);
                if (data.email) localStorage.setItem("user", JSON.stringify({
                    email: data.email,
                    name: data.name || "",
                    tipo: loginType
                }));

                log(`✅ Login bem-sucedido!`, "success");
                log(`🔑 Token: ${data.token.slice(0, 24)}...`, "success");
                log(`👤 User ID: ${data.id || "N/A"}`, "success");
                log(`🏷️  User Type: ${data.key || "N/A"}`, "success");

                log("\n📦 localStorage atualizado:", "info");
                showStorageContent();

            } catch (error) {
                log(`❌ Erro na requisição: ${error.message}`, "error");
            }
        }

        async function testAPI() {
            const token = localStorage.getItem("token");
            const userId = localStorage.getItem("userId");

            if (!token) {
                log("❌ Nenhum token encontrado. Faça login primeiro!", "error");
                return;
            }

            if (!userId) {
                log("⚠️  Nenhum userId encontrado!", "warning");
                return;
            }

            const path = `/estatisticas-gerais/${userId}`;
            const url = `${API_BASE}${path}`;

            log(`\n📡 Testando API call...`, "info");
            log(`📍 Endpoint: GET ${url}`, "info");
            log(`🔑 Token: ${token.slice(0, 24)}...`, "info");

            try {
                const response = await fetch(url, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "x-access-token": token,
                    },
                });

                log(`📊 Status: ${response.status}`, response.ok ? "success" : "error");

                const data = await response.json();
                
                if (!response.ok) {
                    log(`❌ API Error: ${JSON.stringify(data, null, 2)}`, "error");
                    return;
                }

                log(`✅ API call bem-sucedida!`, "success");
                log(`📊 Dados: ${JSON.stringify(data, null, 2)}`, "success");

            } catch (error) {
                log(`❌ Erro na requisição: ${error.message}`, "error");
            }
        }

        // Mostrar storage ao carregar
        window.addEventListener("load", () => {
            log("🏠 Debug Login Test Iniciado", "info");
            showStorageContent();
        });
    </script>
</body>
</html>
